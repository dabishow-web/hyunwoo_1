<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Co-Budget | Pastel Heart</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pastel: {
                lavender: '#E8E4F8',
                rose: '#F9E2E6',
                mint: '#E2F0EB',
                peach: '#FFF1E6',
                sand: '#F7F3F0',
                purple: '#D4C6F0',
                text: '#4A4A4A'
              }
            },
            fontFamily: {
              sans: ['Pretendard', 'Inter', '-apple-system', 'sans-serif'],
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '3rem',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
      
      body {
        font-family: 'Pretendard', sans-serif;
        background-color: #FDFBFA;
        color: #4A4A4A;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
      }
      
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass {
        background: rgba(24, 24, 27, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .soft-shadow {
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
      }

      .grape-shine {
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
      }
      
      input, select {
        border-radius: 1rem !important;
        background-color: #F9F7F5 !important;
        border: 1px solid transparent !important;
        transition: all 0.2s ease;
      }
      
      input:focus, select:focus {
        background-color: #FFFFFF !important;
        border-color: #D4C6F0 !important;
        box-shadow: 0 0 0 4px rgba(212, 198, 240, 0.2) !important;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #E8E4F8;
        border-radius: 10px;
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 8s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
